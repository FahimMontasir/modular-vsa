name: "Setup Bun"
description: "Sets up Bun with dependency caching"

runs:
  using: "composite"
  steps:
    - name: 🔧 Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: 📦 Cache Bun dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.bun/install/cache
          node_modules
          */*/node_modules
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: 📦 Install dependencies
      shell: bash
      run: bun ci --ignore-scripts
