name: Run Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      DO_NOT_TRACK: 1

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: 🏗 Setup Bun
        uses: ./.github/actions/bun

      - name: 🧪 Run Tests
        run: bun test:unit
