name: Run Checks

on:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      DO_NOT_TRACK: 1

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: 🏗 Setup Bun
        uses: ./.github/actions/bun

      - name: 🔍 Lint, format, and typecheck
        run: bun check
